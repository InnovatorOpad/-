<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد تصاميم الشعر - TikTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital@0;1&family=Reem+Kufi+Fun&family=Cairo:wght@400;700;900&family=El+Messiri&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f0f;
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }
        h1 {
            text-align: center;
            margin: 20px 0;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #f9ca24, #f0932b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }
        .input-group {
            margin: 20px 0;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border-radius: 16px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 1.1rem;
            font-family: 'Cairo', sans-serif;
            resize: vertical;
            outline: none;
            transition: 0.3s;
        }
        textarea:focus {
            border-color: #f9ca24;
            box-shadow: 0 0 15px rgba(249,202,36,0.3);
        }
        .designs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .design-btn {
            aspect-ratio: 9/16;
            border-radius: 12px;
            border: 2px solid #333;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 8px rgba(0,0,0,0.5);
            transition: 0.3s;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8px;
        }
        .design-btn:hover, .design-btn.active {
            border-color: #f9ca24;
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(249,202,36,0.5);
        }
        .design1 { background: linear-gradient(135deg, #1e1e2f, #2d2d44); }
        .design2 { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
        .design3 { background: radial-gradient(circle at top left, #3a1c71, #d76d77, #ffaf7b); }
        .design4 { background: linear-gradient(45deg, #000428, #004e92); }
        .design5 { background: linear-gradient(135deg, #0c0c0c, #1a1a1a); box-shadow: inset 0 0 60px rgba(255,215,0,0.2); }
        .design6 { background: linear-gradient(160deg, #434343, #000000); }

        .preview-box {
            width: 100%;
            aspect-ratio: 9/16;
            border-radius: 20px;
            border: 2px solid #333;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px 20px;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            color: #fff;
            transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .poetry-text {
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1.8;
            z-index: 1;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
            word-break: break-word;
            max-width: 100%;
        }
        .design-label {
            position: absolute;
            bottom: 15px;
            font-size: 0.8rem;
            opacity: 0.7;
            z-index: 1;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f9ca24, #f0932b);
            color: #000;
        }
        .btn-secondary {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .font-selector {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a1a;
            padding: 10px 15px;
            border-radius: 30px;
        }
        select {
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            outline: none;
            flex: 1;
        }
        .note {
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.6;
            margin-top: 20px;
        }
        @media (max-width: 400px) {
            .poetry-text { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ بيت الشعر بتصميم تيك توكي</h1>

        <div class="input-group">
            <textarea id="poetryInput" placeholder="اكتب بيت الشعر هنا..."></textarea>
        </div>

        <div class="designs-grid" id="designGrid"></div>

        <div class="font-selector">
            <span>🎨 الخط:</span>
            <select id="fontSelect">
                <option value="'Amiri', serif">أميري (كلاسيكي)</option>
                <option value="'Reem Kufi Fun', sans-serif" selected>كوفي حديث</option>
                <option value="'Cairo', sans-serif">قاهرة عصري</option>
                <option value="'El Messiri', sans-serif">المسيري</option>
                <option value="'Amiri Quran', serif">قرآني</option>
            </select>
        </div>

        <div class="preview-box" id="previewBox">
            <div class="poetry-text" id="displayPoetry">أضف بيتاً</div>
            <span class="design-label" id="designLabel">تصميم 1</span>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" id="screenshotBtn">📸 حفظ كصورة</button>
            <button class="btn btn-secondary" id="refreshBtn">🔄 عشوائي</button>
        </div>
        <p class="note">اختر التصميم ثم خذ لقطة شاشة للفيديو ✂️</p>
    </div>

    <script>
        const designs = [
            { id: 1, class: 'design1', name: 'أرجواني ليلي' },
            { id: 2, class: 'design2', name: 'أزرق محيطي' },
            { id: 3, class: 'design3', name: 'غروب وردي' },
            { id: 4, class: 'design4', name: 'كحلي فاخر' },
            { id: 5, class: 'design5', name: 'ذهبي أنيق' },
            { id: 6, class: 'design6', name: 'داكن كلاسيك' },
        ];

        const poetryInput = document.getElementById('poetryInput');
        const displayPoetry = document.getElementById('displayPoetry');
        const previewBox = document.getElementById('previewBox');
        const designGrid = document.getElementById('designGrid');
        const fontSelect = document.getElementById('fontSelect');
        const designLabel = document.getElementById('designLabel');

        let currentDesign = designs[0];

        function renderDesignButtons() {
            designGrid.innerHTML = '';
            designs.forEach(d => {
                const btn = document.createElement('div');
                btn.className = `design-btn ${d.class}`;
                btn.textContent = d.name;
                btn.addEventListener('click', () => setDesign(d));
                if (d.id === currentDesign.id) btn.classList.add('active');
                designGrid.appendChild(btn);
            });
        }

        function setDesign(design) {
            currentDesign = design;
            previewBox.className = `preview-box ${design.class}`;
            designLabel.textContent = design.name;
            document.querySelectorAll('.design-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`.design-btn.${design.class}`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        poetryInput.addEventListener('input', () => {
            const text = poetryInput.value.trim();
            displayPoetry.textContent = text || 'أضف بيتاً';
        });

        fontSelect.addEventListener('change', () => {
            displayPoetry.style.fontFamily = fontSelect.value;
        });

        document.getElementById('refreshBtn').addEventListener('click', () => {
            const randomDesign = designs[Math.floor(Math.random() * designs.length)];
            setDesign(randomDesign);
            const fonts = ["'Amiri', serif", "'Reem Kufi Fun', sans-serif", "'Cairo', sans-serif", "'El Messiri', sans-serif", "'Amiri Quran', serif"];
            fontSelect.value = fonts[Math.floor(Math.random() * fonts.length)];
            displayPoetry.style.fontFamily = fontSelect.value;
        });

        // زر حفظ كصورة باستخدام html2canvas (اختياري)
        document.getElementById('screenshotBtn').addEventListener('click', function() {
            if (typeof html2canvas === 'undefined') {
                alert('جاري تحميل أداة التصوير... الرجاء المحاولة بعد لحظة.');
                loadHtml2Canvas(() => captureScreenshot());
                return;
            }
            captureScreenshot();
        });

        function captureScreenshot() {
            html2canvas(previewBox, {
                backgroundColor: null,
                scale: 2,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'تصميم-بيت-شعر.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        function loadHtml2Canvas(callback) {
            if (window.html2canvas) {
                callback();
                return;
            }
            const script = document.createElement('script');
            script.src = 'https://html2canvas.hertzen.com/dist/html2canvas.min.js';
            script.onload = callback;
            document.head.appendChild(script);
        }

        // تعيين افتراضي
        displayPoetry.style.fontFamily = fontSelect.value;
        renderDesignButtons();
        setDesign(currentDesign);
        poetryInput.value = 'ألا ليت شعري هل أبيتن ليلةً ... بوادي القرى إني إذن لسعيدُ';
        displayPoetry.textContent = poetryInput.value;
    </script>
</body>
  </html>
